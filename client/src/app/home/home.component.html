<div class="hero">
    @if (!registerMode) {
    <div class="hero-content">
        <span class="hero-badge"><i class="fa fa-heart"></i> New here? It only takes a minute</span>
        <h1>Find your match</h1>
        <p class="lead">
            Real people, real conversations, real-time. Create a profile, browse matches nearby
            and start chatting the moment you connect.
        </p>
        <div class="hero-actions">
            <button (click)="registerToggle()" class="btn btn-primary btn-lg">Get started</button>
            <span class="hero-hint">Already have an account? Log in from the top right.</span>
        </div>
    </div>
    }

    @if (registerMode) {
    <div class="row justify-content-center w-100">
        <div class="col-12 col-sm-8 col-md-6 col-lg-4">
            <app-register (cancelRegister)="cancelRegisterMode($event)"></app-register>
        </div>
    </div>
    }
</div>
