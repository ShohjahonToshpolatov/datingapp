<div class="text-center mt-3">
    <h2>Your matches <span class="text-muted fs-6">— {{pagination?.totalItems}} found</span></h2>
</div>

@if (userParams) {
<div class="container mt-3">
    <form #form="ngForm" class="filter-bar d-flex flex-wrap align-items-center gap-3 mb-3"
        (ngSubmit)="onFilterSubmit()" autocomplete="off">
        <div class="d-flex align-items-center gap-2">
            <label class="col-form-label mb-0">Age from</label>
            <input type="number" class="form-control" style="width: 70px;" name="minAge"
                [(ngModel)]="userParams.minAge">
        </div>

        <div class="d-flex align-items-center gap-2">
            <label class="col-form-label mb-0">to</label>
            <input type="number" class="form-control" style="width: 70px;" name="maxAge"
                [(ngModel)]="userParams.maxAge">
        </div>

        <div class="d-flex align-items-center gap-2">
            <label class="col-form-label mb-0">Show</label>
            <select name="gender" style="width: 130px" class="form-select" [(ngModel)]="userParams.gender">
                @for (gender of genderList; track $index) {
                <option [value]="gender.value">{{gender.display}}</option>
                }
            </select>
        </div>

        <button class="btn btn-primary">Apply</button>
        <button type="button" (click)="resetFilters()" class="btn btn-outline-secondary">
            Reset
        </button>

        <div class="ms-auto">
            <div class="btn-group" btnRadioGroup name="orderBy" ngDefaultControl [(ngModel)]="userParams.orderBy"
                (ngModelChange)="loadMembers()">
                <button class="btn btn-outline-primary" btnRadio="lastActive" type="button">Last Active</button>
                <button class="btn btn-outline-primary" btnRadio="created" type="button">Newest Member</button>
            </div>
        </div>
    </form>
</div>
}

<div class="container mt-3">
    <div class="row justify-content-center">
        @for (member of members; track member.id) {
        <div class="col-6 col-md-4 col-lg-2 mb-4">
            <app-member-card [member]="member"></app-member-card>
        </div>
        }
    </div>
</div>

@if (pagination) {
<div class="d-flex justify-content-center">
    <pagination [boundaryLinks]="true" [totalItems]="pagination.totalItems" [itemsPerPage]="pagination.itemsPerPage"
        [maxSize]="10" [(ngModel)]="pagination.currentPage" (pageChanged)="pageChanged($event)" previousText="&lsaquo;"
        nextText="&rsaquo;" firstText="&laquo;" lastText="&raquo;">
    </pagination>
</div>
}
