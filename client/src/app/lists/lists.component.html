<div class="text-center mt-3">
    <h2>{{ predicate === 'liked' ? 'Members I like' : 'Members who like me' }}</h2>
</div>

<div class="container mt-3">
    <div class="d-flex">
        <div class="btn-group" name="predicate">

            <button class="btn btn-primary" btnRadio="liked" [(ngModel)]="predicate" (click)="loadLikes()">
                Members I like
            </button>

            <button class="btn btn-primary" btnRadio="likedBy" [(ngModel)]="predicate" (click)="loadLikes()">
                Members who like me
            </button>

        </div>
    </div>

    <div class="row mt-3">
        @for (member of members; track $index) {
        <div class="col-2">
            <p>{{ member.knownAs }}</p>
            <p>{{ member.username }}</p>
        </div>
        }
    </div>
</div>
