<nav class="navbar navbar-expand-lg bg-light ">
    <div class="container-fluid">
        <a class="navbar-brand" routerLink="/" routerLinkActive="active">Dating App</a>


        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            @if (accountService.currentUser$ | async) {
            <ng-container>
                <li class="nav-item">
                    <a class="nav-link" routerLink="/members" routerLinkActive="active">Matches</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" routerLink="/lists" routerLinkActive="active">Lists</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" routerLink="/messages" routerLinkActive="active">Messages</a>
                </li>
            </ng-container>
            }
        </ul>


        @if ((accountService.currentUser$ | async); as user) {
        <li ngbDropdown class="nav-item dropdown" style="list-style: none;">
            <a class="nav-link dropdown-toggle" ngbDropdownToggle href="#">Welcome {{ user.username | titlecase}}</a>
            <div ngbDropdownMenu class="dropdown-menu">
                <a class="dropdown-item" href="#">Edit Profile</a>
                <div class="dropdown-divider"></div>
                <a class="nav-link" href="#" (click)="logout()">Logout</a>
            </div>
        </li>
        }

        @if (!(accountService.currentUser$| async)) {
        <form #loginForm="ngForm" class="d-flex" (ngSubmit)="login()" autocomplete="off">
            <input class="form-control me-2" name="username" [(ngModel)]="model.Username" type="text"
                placeholder="Username" />
            <input class="form-control me-2" name="password" [(ngModel)]="model.Password" type="password"
                placeholder="Password" />
            <button class="btn btn-success" type="submit">Login</button>
        </form>
        }
    </div>
</nav>
