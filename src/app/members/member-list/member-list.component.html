<div class="text-center mt-3">
    <h2>Your matches - {{pagination?.totalItems}} found</h2>
</div>

@if (userParams) {
<div class="container mt-3">
    <form #form="ngForm" class="d-flex mb-3" (ngSubmit)="onFilterSubmit()" autocomplete="off">
        <div class="d-flex mx-2">
            <label class="col-form-label">Age from: </label>
            <input type="number" class="form-control ms-1" style="width: 70px;" name="minAge"
                [(ngModel)]="userParams.minAge">
        </div>

        <div class="d-flex mx-2">
            <label class="col-form-label">Age to: </label>
            <input type="number" class="form-control ms-1" style="width: 70px;" name="maxAge"
                [(ngModel)]="userParams.maxAge">
        </div>

        <div class="d-flex px-2">
            <label class="col-form-label me-2">Show: </label>
            <select name="gender" style="width: 130px" class="form-select ms-1" [(ngModel)]="userParams.gender">
                @for (gender of genderList; track $index) {
                <option [value]="gender.value">{{gender.display}}</option>
                }
            </select>
        </div>

        <button class="btn btn-primary ms-1">Apply Filters</button>
        <button type="button" (click)="resetFilters()" class="btn btn-info ms-1">
            Reset Filters
        </button>

        <div class="col">
            <div class="btn-group float-end" btnRadioGroup name="orderBy" ngDefaultControl
                [(ngModel)]="userParams.orderBy" (ngModelChange)="loadMembers()">
                <button class="btn btn-primary" btnRadio="lastActive" type="button">Last Active</button>
                <button class="btn btn-primary" btnRadio="created" type="button">Newest Member</button>
            </div>
        </div>
    </form>
</div>
}

<div class="container mt-3">
    <div class="row justify-content-center">
        @for (member of members; track member.id) {
        <div class="col-6 col-md-4 col-lg-2 mb-4">
            <app-member-card [member]="member"></app-member-card>
        </div>
        }
    </div>
</div>

@if (pagination) {
<div class="d-flex justify-content-center">
    <pagination [boundaryLinks]="true" [totalItems]="pagination.totalItems" [itemsPerPage]="pagination.itemsPerPage"
        [maxSize]="10" [(ngModel)]="pagination.currentPage" (pageChanged)="pageChanged($event)" previousText="&lsaquo;"
        nextText="&rsaquo;" firstText="&laquo;" lastText="&raquo;">
    </pagination>
</div>
}
